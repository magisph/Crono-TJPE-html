<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cronograma de Estudos — TJPE</title>
<style>
  :root{
    --bg:#0f172a; --bg2:#111c34; --card:#182640; --card2:#1e2f4d;
    --line:#2a3d61; --txt:#e8eef8; --mut:#9fb0cc; --mut2:#7286a8;
    --accent:#38bdf8; --accent2:#22d3ee; --ok:#34d399; --okdim:#14512f;
    --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    background:linear-gradient(180deg,#0b1220,#0f172a 240px);
    color:var(--txt); line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:24px 18px 72px}
  header.top{margin-bottom:18px}
  h1{font-size:clamp(20px,3.4vw,30px);margin:0 0 4px;letter-spacing:.2px}
  .period{color:var(--mut);font-size:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    box-shadow:var(--shadow)}
  .summary{padding:18px;margin:16px 0}
  .sumgrid{display:flex;flex-wrap:wrap;gap:18px 26px;align-items:flex-end}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .big{font-size:clamp(22px,4vw,34px);font-weight:700;line-height:1}
  .stat .lbl{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
  .stat .big .sub{font-size:15px;color:var(--mut);font-weight:500}
  .spacer{flex:1 1 60px}
  .btn{cursor:pointer;border:1px solid var(--line);background:var(--card2);
    color:var(--txt);padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;
    transition:background .15s,border-color .15s}
  .btn:hover{background:#25406a;border-color:#39568c}
  .bar{height:12px;border-radius:8px;background:#0d1830;border:1px solid var(--line);
    overflow:hidden;margin-top:14px}
  .bar > i{display:block;height:100%;width:0;border-radius:8px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width .35s ease}
  .chartcard{padding:18px 14px 10px;margin:16px 0}
  .chartcard h2{font-size:15px;margin:2px 6px 8px;color:var(--mut);font-weight:600;
    text-transform:uppercase;letter-spacing:.6px}
  svg.chart{width:100%;height:auto;display:block}
  .chart text{fill:var(--mut2);font-size:11px;font-family:inherit}
  .chart .axis{stroke:var(--line);stroke-width:1}
  .chart .grid{stroke:#1b2c49;stroke-width:1}
  .chart .phaseln{stroke:#33507f;stroke-width:1;stroke-dasharray:3 4}
  .chart .today{stroke:#fbbf24;stroke-width:1.5;stroke-dasharray:2 3}
  .chart .area{fill:url(#grad)}
  .chart .pline{fill:none;stroke:var(--accent2);stroke-width:2.5;
    stroke-linejoin:round;stroke-linecap:round}
  .chart .plabel{fill:var(--mut);font-size:11px}
  .phase{margin:30px 0 6px}
  .phase h2{font-size:18px;margin:0 0 2px;display:flex;align-items:center;gap:10px}
  .phase .pmeta{color:var(--mut);font-size:13px;margin:0 0 12px}
  .phase-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;
    background:#0d2137;color:var(--accent);border:1px solid #22496e}
  .day{padding:14px 16px;margin:12px 0;transition:border-color .2s,background .2s}
  .day.done{border-color:var(--okdim);background:linear-gradient(180deg,#14261d,#152a20)}
  .dayhead{display:flex;align-items:center;justify-content:space-between;gap:10px;
    margin-bottom:10px}
  .daytitle{font-weight:650;font-size:15px}
  .daytag{font-size:12px;color:var(--mut);white-space:nowrap}
  .daytag.full{color:var(--ok);font-weight:700}
  .sess{display:flex;gap:12px;padding:11px;border-radius:12px;background:var(--card2);
    border:1px solid transparent;margin:8px 0}
  .sess.done{background:#132a20;border-color:var(--okdim)}
  .sess label.chk{flex:0 0 auto;display:flex;align-items:flex-start;cursor:pointer;
    padding-top:2px}
  .sess input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--ok);
    margin:0}
  .sbody{flex:1 1 auto;min-width:0}
  .srow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:5px}
  .disc{font-size:12.5px;font-weight:700;padding:3px 10px;border-radius:8px;color:#0b1220}
  .cargatag{font-size:12px;color:var(--mut);font-weight:600;
    background:#0d1830;border:1px solid var(--line);padding:2px 8px;border-radius:7px}
  .sess.done .disc{filter:saturate(.5) brightness(.9)}
  ul.temas{margin:4px 0 0;padding-left:20px}
  ul.temas li{font-size:13.5px;color:#cdd9ec;margin:1px 0}
  .sess.done ul.temas li{color:var(--mut);text-decoration:line-through;
    text-decoration-color:#2f6a4a}
  footer.foot{margin-top:40px;color:var(--mut2);font-size:12px;text-align:center}
  @media (max-width:560px){
    .wrap{padding:16px 12px 60px}
    .sumgrid{gap:14px 20px}
    .spacer{flex-basis:100%;height:0}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Cronograma de Estudos — TJPE</h1>
    <div class="period" id="period"></div>
  </header>

  <section class="card summary">
    <div class="sumgrid">
      <div class="stat">
        <div class="big"><span id="doneCount">0</span><span class="sub">/<span id="totalCount">0</span> sessões</span></div>
        <div class="lbl">Sessões concluídas</div>
      </div>
      <div class="stat">
        <div class="big"><span id="pct">0</span><span class="sub">%</span></div>
        <div class="lbl">Progresso</div>
      </div>
      <div class="stat">
        <div class="big"><span id="doneHours">0</span><span class="sub">/<span id="totalHours">0</span> h</span></div>
        <div class="lbl">Carga horária</div>
      </div>
      <div class="spacer"></div>
      <button class="btn" id="resetBtn" type="button">Limpar progresso</button>
    </div>
    <div class="bar"><i id="barFill"></i></div>
  </section>

  <section class="card chartcard">
    <h2>Progressão — sessões concluídas ao longo dos dias</h2>
    <div id="chart"></div>
  </section>

  <main id="phases"></main>

  <footer class="foot">
    Seu progresso é salvo automaticamente neste navegador. &nbsp;·&nbsp; 146 sessões · 240 h · 73 dias
  </footer>
</div>

<script>
"use strict";
const PLANO = JSON.parse(document.getElementById('plano').textContent);
const STORE_KEY = 'crono-tjpe-v1';

const DISC_COLORS = {
  "Administrativo":"#60a5fa","Ambiental":"#34d399","Civil":"#f472b6",
  "Constitucional":"#a78bfa","Consumidor":"#fbbf24","Direitos Humanos":"#fb7185",
  "ECA":"#38bdf8","Eleitoral":"#c084fc","Empresarial":"#f59e0b",
  "Financeiro/Tributário":"#2dd4bf","Formação Humanística":"#e879f9",
  "Penal":"#f87171","Processo Civil":"#818cf8","Processo Penal":"#fca5a5"
};
function discColor(d){ return DISC_COLORS[d] || "#94a3b8"; }

function fmtMin(m){
  const h = Math.floor(m/60), r = m%60;
  return h + "h" + String(r).padStart(2,'0');
}
function sessionKey(date, idx){ return date + "#" + idx; }

function loadDone(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    return new Set(raw ? JSON.parse(raw) : []);
  }catch(e){ return new Set(); }
}
function saveDone(set){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify([...set])); }catch(e){}
}
let done = loadDone();

// ---- totals ----
const days = PLANO.days;
let TOTAL_SESS = 0, TOTAL_MIN = 0;
const phaseOrder = [];
for(const day of days){
  for(const s of day.sessions){ TOTAL_SESS++; TOTAL_MIN += s.minutes; }
  const m = day.dayLabel.match(/Fase\s*([0-9]+)/);
  day._phase = m ? m[1] : "—";
  if(!phaseOrder.includes(day._phase)) phaseOrder.push(day._phase);
}

// ---- helpers over current progress ----
function isDone(date, idx){ return done.has(sessionKey(date, idx)); }
function dayDoneCount(day, di){
  let c = 0; day.sessions.forEach((s,i)=>{ if(isDone(day.date,i)) c++; }); return c;
}
function totals(){
  let ds=0, dm=0;
  days.forEach(day=>day.sessions.forEach((s,i)=>{ if(isDone(day.date,i)){ ds++; dm+=s.minutes; }}));
  return {ds, dm};
}

// ---- render summary ----
function renderSummary(){
  const {ds, dm} = totals();
  document.getElementById('doneCount').textContent = ds;
  document.getElementById('totalCount').textContent = TOTAL_SESS;
  document.getElementById('pct').textContent = Math.round(ds/TOTAL_SESS*100);
  document.getElementById('doneHours').textContent = (dm/60).toFixed(1).replace('.',',');
  document.getElementById('totalHours').textContent = Math.round(TOTAL_MIN/60);
  document.getElementById('barFill').style.width = (ds/TOTAL_SESS*100) + '%';
}

// ---- chart ----
function computeCumulative(){
  // cumulative completed sessions up to and including each day index
  const arr = []; let run = 0;
  days.forEach(day=>{ run += dayDoneCount(day); arr.push(run); });
  return arr;
}
function todayIndex(){
  const t = new Date(); t.setHours(0,0,0,0);
  for(let i=0;i<days.length;i++){
    const d = new Date(days[i].date + "T00:00:00");
    if(d.getTime() === t.getTime()) return i;
  }
  return -1;
}
function renderChart(){
  const W=920, H=320, padL=42, padR=14, padT=14, padB=34;
  const n = days.length;
  const cum = computeCumulative();
  const maxY = TOTAL_SESS;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const x = i => padL + (n<=1?0:(i/(n-1))*plotW);
  const y = v => padT + plotH - (v/maxY)*plotH;

  // y gridlines every 25% of total
  let grid = "", ylab = "";
  const steps = 4;
  for(let k=0;k<=steps;k++){
    const val = maxY*k/steps, yy = y(val);
    grid += `<line class="grid" x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}"/>`;
    ylab += `<text x="${padL-6}" y="${(yy+3.5).toFixed(1)}" text-anchor="end">${Math.round(val)}</text>`;
  }
  // phase boundary vertical lines + labels
  let phaseMarks = "";
  for(let i=1;i<n;i++){
    if(days[i]._phase !== days[i-1]._phase){
      const xx = (x(i)+x(i-1))/2;
      phaseMarks += `<line class="phaseln" x1="${xx.toFixed(1)}" y1="${padT}" x2="${xx.toFixed(1)}" y2="${padT+plotH}"/>`;
    }
  }
  // phase labels centered per phase run
  let plabels = "";
  let start = 0;
  for(let i=1;i<=n;i++){
    if(i===n || days[i]._phase !== days[start]._phase){
      const mid = (x(start)+x(i-1))/2;
      plabels += `<text class="plabel" x="${mid.toFixed(1)}" y="${(padT+12)}" text-anchor="middle">Fase ${days[start]._phase}</text>`;
      start = i;
    }
  }
  // x labels: show ~every 10 days (day numbers) + last
  let xlab = "";
  for(let i=0;i<n;i+=10){
    xlab += `<text x="${x(i).toFixed(1)}" y="${H-padB+18}" text-anchor="middle">${i+1}</text>`;
  }
  xlab += `<text x="${x(n-1).toFixed(1)}" y="${H-padB+18}" text-anchor="middle">${n}</text>`;

  // line + area path
  let line = "";
  cum.forEach((v,i)=>{ line += (i===0?"M":"L") + x(i).toFixed(1) + " " + y(v).toFixed(1) + " "; });
  const area = `M${x(0).toFixed(1)} ${y(0).toFixed(1)} ` +
    cum.map((v,i)=>`L${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(" ") +
    ` L${x(n-1).toFixed(1)} ${y(0).toFixed(1)} Z`;

  // today marker
  const ti = todayIndex();
  let today = "";
  if(ti>=0){
    today = `<line class="today" x1="${x(ti).toFixed(1)}" y1="${padT}" x2="${x(ti).toFixed(1)}" y2="${padT+plotH}"/>` +
      `<text x="${x(ti).toFixed(1)}" y="${padT-2}" text-anchor="middle" fill="#fbbf24">hoje</text>`;
  }
  // last point dot
  const lastV = cum[n-1];
  const dot = `<circle cx="${x(n-1).toFixed(1)}" cy="${y(lastV).toFixed(1)}" r="4" fill="#22d3ee"/>`;

  const svg = `
  <svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img"
       aria-label="Gráfico de progressão: ${lastV} de ${maxY} sessões concluídas">
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    ${grid}${phaseMarks}
    <line class="axis" x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}"/>
    <line class="axis" x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}"/>
    ${ylab}${xlab}${plabels}
    <path class="area" d="${area}"/>
    <path class="pline" d="${line.trim()}"/>
    ${today}${dot}
    <text x="${(padL+ (W-padR-padL)/2).toFixed(1)}" y="${H-4}" text-anchor="middle">Dia do cronograma</text>
  </svg>`;
  document.getElementById('chart').innerHTML = svg;
}

// ---- render days grouped by phase ----
function renderPhases(){
  const root = document.getElementById('phases');
  root.innerHTML = "";
  for(const ph of phaseOrder){
    const pdays = days.filter(d=>d._phase===ph);
    let sess=0, mins=0;
    pdays.forEach(d=>d.sessions.forEach(s=>{sess++;mins+=s.minutes;}));
    const sec = document.createElement('section');
    sec.className = 'phase';
    sec.innerHTML =
      `<h2><span class="phase-badge">Fase ${ph}</span></h2>` +
      `<p class="pmeta">${pdays.length} dias · ${sess} sessões · ${(mins/60).toFixed(0)} h</p>`;
    pdays.forEach(day=>{
      // strip "— Fase N" from label for cleaner title
      const title = day.dayLabel.replace(/\s*—\s*Fase\s*[0-9]+\s*$/,'');
      const card = document.createElement('article');
      card.className = 'card day';
      card.dataset.date = day.date;
      let sHtml = "";
      day.sessions.forEach((s,i)=>{
        const key = sessionKey(day.date,i);
        const checked = isDone(day.date,i);
        const col = discColor(s.disciplina);
        const temas = s.temas.map(t=>`<li>${escapeHtml(t)}</li>`).join("");
        sHtml +=
          `<div class="sess${checked?' done':''}" data-key="${key}">
            <label class="chk"><input type="checkbox" data-key="${key}" ${checked?'checked':''}></label>
            <div class="sbody">
              <div class="srow">
                <span class="disc" style="background:${col}">${escapeHtml(s.disciplina)}</span>
                <span class="cargatag">${fmtMin(s.minutes)}</span>
              </div>
              <ul class="temas">${temas}</ul>
            </div>
          </div>`;
      });
      card.innerHTML =
        `<div class="dayhead">
           <span class="daytitle">${escapeHtml(title)}</span>
           <span class="daytag" data-daytag></span>
         </div>${sHtml}`;
      sec.appendChild(card);
    });
    root.appendChild(sec);
  }
  // wire checkboxes
  root.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change', onToggle);
  });
  refreshDayStates();
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function onToggle(e){
  const key = e.target.dataset.key;
  if(e.target.checked) done.add(key); else done.delete(key);
  saveDone(done);
  // update the session row visual
  const sess = e.target.closest('.sess');
  if(sess) sess.classList.toggle('done', e.target.checked);
  refreshDayStates();
  renderSummary();
  renderChart();
}

function refreshDayStates(){
  document.querySelectorAll('.day').forEach(card=>{
    const date = card.dataset.date;
    const day = days.find(d=>d.date===date);
    const total = day.sessions.length;
    let c = 0; day.sessions.forEach((s,i)=>{ if(isDone(date,i)) c++; });
    const tag = card.querySelector('[data-daytag]');
    const full = c===total && total>0;
    card.classList.toggle('done', full);
    tag.textContent = full ? '✓ concluído' : `${c}/${total} sessões`;
    tag.classList.toggle('full', full);
  });
}

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('Limpar todo o progresso registrado? Esta ação não pode ser desfeita.')) return;
  done = new Set();
  saveDone(done);
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>{cb.checked=false;});
  document.querySelectorAll('.sess.done').forEach(s=>s.classList.remove('done'));
  refreshDayStates();
  renderSummary();
  renderChart();
});

// ---- init ----
const sd = days[0].date.split('-'), ed = days[days.length-1].date.split('-');
document.getElementById('period').textContent =
  `${sd[2]}/${sd[1]}/${sd[0]} → ${ed[2]}/${ed[1]}/${ed[0]}  ·  ${days.length} dias  ·  ${TOTAL_SESS} sessões  ·  ${Math.round(TOTAL_MIN/60)} h`;
renderPhases();
renderSummary();
renderChart();
</script>
