<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f4f6fb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f1729" media="(prefers-color-scheme: dark)">
<meta name="description" content="Gerenciador do cronograma de estudos para o concurso do TJPE.">
<title>Cronograma de Estudos — TJPE</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<meta name="application-name" content="Crono TJPE">
<meta name="mobile-web-app-capable" content="yes">
<style>
  /* ---------- THEME TOKENS (light default; dark via media / manual) ---------- */
  :root{
    color-scheme: light dark;
    --bg:#f4f6fb; --surface:#ffffff; --surface2:#eef2f9; --surface3:#e7edf7;
    --txt:#17233a; --mut:#4a5b78; --mut2:#63748f; --line:#d6deec;
    --primary:#0e7490; --primary2:#0891b2; --onprimary:#ffffff;
    --ok:#0f9d63; --okbg:#e2f6ec; --okline:#9fdcbc; --okstrike:#0f9d63;
    --focus:#0891b2; --shadow:0 4px 16px rgba(30,50,90,.10);
    --chip-ink:#0b1220;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      color-scheme: dark;
      --bg:#0f1729; --surface:#182640; --surface2:#1e2f4d; --surface3:#24375a;
      --txt:#e8eef8; --mut:#9fb0cc; --mut2:#7f92b4; --line:#2a3d61;
      --primary:#38bdf8; --primary2:#22d3ee; --onprimary:#08131f;
      --ok:#34d399; --okbg:#13291f; --okline:#1f6f47; --okstrike:#2f6a4a;
      --focus:#38bdf8; --shadow:0 6px 24px rgba(0,0,0,.35);
      --chip-ink:#0b1220;
    }
  }
  /* Força o color-scheme conforme o tema escolhido manualmente — garante que
     controles nativos (checkbox) sigam o tema, e não a preferência do sistema. */
  :root[data-theme="light"]{ color-scheme: light; }
  :root[data-theme="dark"]{
    color-scheme: dark;
    --bg:#0f1729; --surface:#182640; --surface2:#1e2f4d; --surface3:#24375a;
    --txt:#e8eef8; --mut:#9fb0cc; --mut2:#7f92b4; --line:#2a3d61;
    --primary:#38bdf8; --primary2:#22d3ee; --onprimary:#08131f;
    --ok:#34d399; --okbg:#13291f; --okline:#1f6f47; --okstrike:#2f6a4a;
    --focus:#38bdf8; --shadow:0 6px 24px rgba(0,0,0,.35);
    --chip-ink:#0b1220;
  }
  /* Suprime transições durante a troca de tema (evita o "delay"/fade em massa). */
  .theme-switching, .theme-switching *, .theme-switching *::before, .theme-switching *::after{
    transition:none !important;
  }

  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:"Roboto","Roboto Flex",system-ui,sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
    padding-bottom:calc(56px + env(safe-area-inset-bottom));
  }
  a{color:var(--primary)}
  :focus-visible{outline:3px solid var(--focus); outline-offset:2px; border-radius:6px}

  /* ---------- APP BAR (sticky, Material top app bar) ---------- */
  .appbar{
    position:sticky; top:0; z-index:20; background:color-mix(in srgb, var(--surface) 88%, transparent);
    backdrop-filter:saturate(140%) blur(10px); -webkit-backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top);
  }
  .appbar-inner{
    max-width:1080px; margin:0 auto; display:flex; align-items:center; gap:10px;
    padding:8px max(14px, env(safe-area-inset-left)) 8px max(14px, env(safe-area-inset-right));
    min-height:56px;
  }
  .app-title{font-size:1.02rem; font-weight:700; letter-spacing:.2px; margin:0; flex:1 1 auto;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .app-actions{display:flex; gap:6px; flex:0 0 auto}
  .iconbtn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    min-height:48px; min-width:48px; padding:0 14px; border-radius:24px;
    background:transparent; color:var(--txt); border:1px solid var(--line);
    font:inherit; font-size:.86rem; font-weight:600; cursor:pointer;
    transition:background .15s, transform .05s;
  }
  .iconbtn:hover{background:var(--surface2)}
  .iconbtn:active{transform:scale(.96)}
  .iconbtn[disabled]{opacity:.45; cursor:not-allowed}
  .iconbtn .emoji{font-size:1.05rem; line-height:1}
  #installBtn{border-color:color-mix(in srgb, var(--primary) 55%, transparent);
    color:var(--primary); background:color-mix(in srgb, var(--primary) 12%, transparent)}
  @media (max-width:439px){ .btn-txt{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap} }
  .appbar-progress{height:3px; background:var(--surface3)}
  .appbar-progress>i{display:block; height:100%; width:0;
    background:linear-gradient(90deg,var(--primary),var(--primary2)); transition:width .35s ease}

  /* ---------- LAYOUT ---------- */
  .wrap{max-width:1080px; margin:0 auto;
    padding:16px max(14px, env(safe-area-inset-left)) 48px max(14px, env(safe-area-inset-right))}
  .period{color:var(--mut); font-size:.86rem; margin:2px 2px 14px}

  .card{background:var(--surface); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow)}

  /* ---------- SUMMARY ---------- */
  .summary{padding:16px; margin-bottom:16px}
  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:14px}
  .stat{background:var(--surface2); border-radius:12px; padding:12px 12px 10px; text-align:center}
  .stat .big{font-size:clamp(1.35rem,5vw,1.9rem); font-weight:800; line-height:1.05}
  .stat .big .sub{font-size:.9rem; color:var(--mut); font-weight:600}
  .stat .lbl{font-size:.68rem; color:var(--mut); text-transform:uppercase; letter-spacing:.7px; margin-top:4px}
  .bar{height:12px; border-radius:8px; background:var(--surface3); overflow:hidden}
  .bar>i{display:block; height:100%; width:0; border-radius:8px;
    background:linear-gradient(90deg,var(--primary),var(--primary2)); transition:width .35s ease}
  .resetrow{display:flex; justify-content:flex-end; margin-top:12px}
  .btn-reset{min-height:48px; padding:0 18px; border-radius:24px; cursor:pointer;
    background:transparent; color:var(--primary); border:1px solid var(--line);
    font:inherit; font-weight:600; font-size:.86rem; transition:background .15s, transform .05s}
  .btn-reset:hover{background:var(--surface2)}
  .btn-reset:active{transform:scale(.97)}

  /* ---------- CHART ---------- */
  .chartcard{padding:14px 10px 8px; margin-bottom:20px}
  .chartcard h2{font-size:.72rem; margin:2px 8px 6px; color:var(--mut); font-weight:700;
    text-transform:uppercase; letter-spacing:.7px}
  #chart svg{width:100%; height:auto; display:block}
  #chart text{fill:var(--mut2); font-family:inherit}
  #chart .axis{stroke:var(--line); stroke-width:1}
  #chart .grid{stroke:color-mix(in srgb, var(--line) 60%, transparent); stroke-width:1}
  #chart .phaseln{stroke:color-mix(in srgb, var(--primary) 45%, transparent); stroke-width:1; stroke-dasharray:3 4}
  #chart .today{stroke:#f59e0b; stroke-width:1.6; stroke-dasharray:2 3}
  #chart .pline{fill:none; stroke:var(--primary2); stroke-width:2.6; stroke-linejoin:round; stroke-linecap:round}

  /* ---------- PHASES + DAY GRID ---------- */
  .phase{margin:26px 0 4px}
  .phase-h{display:flex; align-items:center; gap:10px; margin:0 2px 2px}
  .phase-badge{font-size:.74rem; font-weight:800; padding:4px 12px; border-radius:999px;
    background:color-mix(in srgb, var(--primary) 16%, var(--surface)); color:var(--primary);
    border:1px solid color-mix(in srgb, var(--primary) 40%, transparent)}
  .pmeta{color:var(--mut); font-size:.8rem; margin:0 2px 12px}
  .days{display:grid; grid-template-columns:1fr; gap:12px}
  @media (min-width:720px){ .days{grid-template-columns:repeat(auto-fill, minmax(330px,1fr))} }

  .day{padding:12px 14px; min-width:0; transition:border-color .2s, background .2s}
  .day.done{border-color:var(--okline); background:var(--okbg)}
  .day.flash{animation:flash 1.4s ease}
  @keyframes flash{0%,100%{box-shadow:var(--shadow)} 20%{box-shadow:0 0 0 3px var(--primary)}}
  .dayhead{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px}
  .daytitle{font-weight:700; font-size:.95rem}
  .daytag{font-size:.76rem; color:var(--mut); white-space:nowrap; flex:0 0 auto}
  .daytag.full{color:var(--ok); font-weight:800}

  /* ---------- SESSION ---------- */
  .sess{display:grid; grid-template-columns:1fr auto; align-items:start; column-gap:6px;
    padding:6px 8px 6px 10px; margin-top:8px; border-radius:12px; background:var(--surface2);
    border:1px solid transparent; transition:background .15s, border-color .15s}
  .sess.done{background:var(--okbg); border-color:var(--okline)}
  /* .sess-main é o alvo de toque (>=44px) que marca a sessão como concluída */
  .sess-main{grid-column:1; display:flex; gap:12px; align-items:flex-start; min-height:44px;
    padding:4px 0; cursor:pointer; -webkit-user-select:none; user-select:none; transition:transform .05s}
  .sess-main:active{transform:scale(.995)}
  .chkwrap{flex:0 0 auto; width:32px; height:32px; display:grid; place-items:center; margin-top:1px}
  .chkwrap input{width:24px; height:24px; margin:0; cursor:pointer; accent-color:var(--ok)}
  .sbody{flex:1 1 auto; min-width:0}
  .srow{display:flex; align-items:center; gap:8px; flex-wrap:wrap; min-width:0; margin-bottom:4px}
  .disc{font-size:.78rem; font-weight:800; padding:3px 10px; border-radius:8px; color:var(--chip-ink);
    overflow-wrap:anywhere}
  .sess.done .disc{filter:saturate(.55) brightness(.96)}
  .carga{font-size:.76rem; color:var(--mut); font-weight:700;
    background:var(--surface); border:1px solid var(--line); padding:2px 9px; border-radius:8px}
  ul.temas{margin:2px 0 0; padding-left:20px}
  ul.temas li{font-size:.85rem; color:var(--txt); margin:1px 0; overflow-wrap:anywhere}
  .sess.done ul.temas li{color:var(--mut); text-decoration:line-through; text-decoration-color:var(--okstrike)}

  /* ---------- REVIEW / SIMULADO SESSION ---------- */
  .sess.review{background:color-mix(in srgb, var(--surface3) 50%, var(--surface2))}
  .sess.review .disc{font-style:italic}
  .sess.simulado .disc{font-weight:900}

  /* ---------- NOTES (caixa de texto retrátil por sessão) ---------- */
  .notes-toggle{grid-column:2; align-self:center; position:relative; width:40px; height:40px;
    display:grid; place-items:center; border:none; background:transparent; color:var(--mut2);
    cursor:pointer; border-radius:10px; transition:background .15s, color .15s}
  .notes-toggle:hover{background:var(--surface3); color:var(--txt)}
  .notes-toggle:active{transform:scale(.94)}
  .notes-toggle svg{width:18px; height:18px; transition:transform .2s ease}
  .notes-toggle[aria-expanded="true"] svg{transform:rotate(90deg)}
  .notes-toggle.has-notes{color:var(--primary)}
  .notes-toggle.has-notes::after{content:""; position:absolute; top:7px; right:7px; width:6px; height:6px;
    border-radius:50%; background:var(--primary)}
  .notes-wrap{grid-column:1 / -1; padding:2px 2px 6px}
  .notes-wrap[hidden]{display:none}
  .notes{width:100%; box-sizing:border-box; resize:vertical; min-height:60px; max-height:400px;
    font:inherit; font-size:.9rem; line-height:1.45; color:var(--txt);
    background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:8px 10px}
  .notes::placeholder{color:var(--mut2)}
  .notes:focus-visible{outline:2px solid var(--focus); outline-offset:1px}

  /* ---------- SNACKBAR (Material) ---------- */
  .snackbar{position:fixed; left:50%; transform:translateX(-50%) translateY(140%);
    bottom:calc(16px + env(safe-area-inset-bottom)); z-index:40; max-width:min(560px, calc(100vw - 24px));
    display:flex; align-items:center; gap:14px; padding:12px 12px 12px 18px; border-radius:12px;
    background:#25324a; color:#eef3fb; box-shadow:0 8px 28px rgba(0,0,0,.4);
    transition:transform .28s cubic-bezier(.2,.7,.3,1)}
  .snackbar.show{transform:translateX(-50%) translateY(0)}
  .snackbar span{font-size:.9rem}
  .snackbar button{min-height:40px; padding:0 12px; border-radius:20px; border:none; cursor:pointer;
    background:transparent; color:#5fd0ff; font:inherit; font-weight:800; text-transform:uppercase;
    font-size:.8rem; letter-spacing:.5px}
  .snackbar button:hover{background:rgba(255,255,255,.08)}

  footer.foot{margin-top:36px; color:var(--mut2); font-size:.78rem; text-align:center; line-height:1.7}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important; animation:none !important; scroll-behavior:auto !important}
  }
</style>
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <h1 class="app-title">Cronograma de Estudos — TJPE</h1>
      <div class="app-actions">
        <button class="iconbtn" id="installBtn" type="button" hidden aria-label="Instalar aplicativo no dispositivo">
          <span class="emoji" aria-hidden="true">⬇️</span><span class="btn-txt">Instalar</span>
        </button>
        <button class="iconbtn" id="todayBtn" type="button" aria-label="Ir para o dia de hoje">
          <span class="emoji" aria-hidden="true">📍</span><span class="btn-txt">Hoje</span>
        </button>
        <button class="iconbtn" id="themeBtn" type="button" aria-label="Alternar tema claro/escuro" aria-pressed="false">
          <span class="emoji" id="themeIcon" aria-hidden="true">🌙</span>
        </button>
      </div>
    </div>
    <div class="appbar-progress"><i id="barTop"></i></div>
  </header>

  <div class="wrap">
    <p class="period" id="period"></p>

    <section class="card summary" aria-label="Resumo do progresso">
      <div class="stats">
        <div class="stat">
          <div class="big"><span id="doneCount">0</span><span class="sub">/<span id="totalCount">0</span></span></div>
          <div class="lbl">Sessões</div>
        </div>
        <div class="stat">
          <div class="big"><span id="pct">0</span><span class="sub">%</span></div>
          <div class="lbl">Progresso</div>
        </div>
        <div class="stat">
          <div class="big"><span id="doneHours">0</span><span class="sub">/<span id="totalHours">0</span>h</span></div>
          <div class="lbl">Carga horária</div>
        </div>
      </div>
      <div class="bar" id="barMain" role="progressbar" aria-label="Progresso geral"
           aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><i id="barFill"></i></div>
      <div class="resetrow">
        <button class="btn-reset" id="resetBtn" type="button">Limpar progresso</button>
      </div>
    </section>

    <section class="card chartcard" aria-label="Gráfico de progressão">
      <h2>Progressão — sessões concluídas ao longo dos dias</h2>
      <div id="chart"></div>
    </section>

    <main id="phases"></main>

    <footer class="foot">
      Seu progresso é salvo automaticamente neste dispositivo (localStorage).<br>
      230 sessões · 321 h · 75 dias · 14 disciplinas
    </footer>
  </div>

  <div class="snackbar" id="snackbar" role="status" aria-live="polite" hidden>
    <span id="snackMsg"></span>
    <button type="button" id="snackAction"></button>
  </div>

":45,"temas":["T-3 → Dia 67 (Civil: bateria mista; ECA: bateria final) · T-15 → Dia 55 (Proc. Civil: possessórias, rescisória, Ouro; Empresarial: S.A., desconsideração) · T-45 → Dia 25 (Proc. Civil: tutela de urgência, estabilização; Empresarial: falência)."],"kind":"review"}]},{"date":"2026-09-22","dayLabel":"Dia 71 — 22/09/2026 (terça-feira) — Fase 3","sessions":[{"disciplina":"Processo Penal","minutes":120,"temas":["Revisão final orientada pelos erros — provas e cautelares, procedimentos, ANPP, juiz das garantias","Questões FGV cronometradas."],"kind":"session"},{"disciplina":"Formação Humanística","minutes":60,"temas":["Releitura final de destaques — resoluções CNJ, jusfilosofia, ética da magistratura."],"kind":"session"},{"disciplina":"Revisão espaçada","minutes":45,"temas":["T-3 → Dia 68 (Penal: desarmamento, orcrim, execução penal, súmulas; Humanística: AED/MASCs, resoluções) · T-15 → Dia 56 (Civil: união estável, alimentos; Eleitoral: propaganda, contas) · T-45 → Dia 26 (Civil: doação, compra e venda, fiança, mandato; Consumidor: planos de saúde)."],"kind":"review"}]},{"date":"2026-09-23","dayLabel":"Dia 72 — 23/09/2026 (quarta-feira) — Fase 3","sessions":[{"disciplina":"Constitucional","minutes":120,"temas":["Revisão final orientada pelos erros — controle de constitucionalidade, direitos fundamentais, organização dos Poderes","Questões FGV cronometradas."],"kind":"session"},{"disciplina":"Direitos Humanos","minutes":60,"temas":["Consolidação final — pegadinhas do rol (supralegalidade x §3º; entrega x extradição; Comissão x Corte IDH) e releitura de destaques (tratados, convencionalidade, casos contra o Brasil)."],"kind":"session"},{"disciplina":"Revisão espaçada","minutes":45,"temas":["T-3 → Dia 69 (erros do Simulado nº 1 — eixos Proc. Civil e Civil) · T-15 → Dia 57 (Proc. Penal: JECrim, Ouro, súmulas; ECA: escuta/depoimento) · T-45 → Dia 27 (Proc. Civil: evidência, competência; ECA: acolhimento, Conselho Tutelar)."],"kind":"review"}]},{"date":"2026-09-24","dayLabel":"Dia 73 — 24/09/2026 (quinta-feira) — Fase 3","sessions":[{"disciplina":"Administrativo","minutes":120,"temas":["Revisão final orientada pelos erros — Lei 14.133, improbidade, responsabilidade do Estado, súmulas","Questões FGV cronometradas."],"kind":"session"},{"disciplina":"Ambiental","minutes":60,"temas":["Releitura final de destaques — princípios, responsabilidades, licenciamento, súmulas e novos temas do rol."],"kind":"session"},{"disciplina":"Revisão espaçada","minutes":45,"temas":["T-3 → Dia 70 (Penal e Eleitoral: revisão por erros) · T-15 → Dia 58 (Constitucional: modulação, controle estadual; Penal: drogas) · T-45 → Dia 28 (Penal: dosimetria 2ª/3ª; Humanística: redes sociais, digital)."],"kind":"review"}]},{"date":"2026-09-25","dayLabel":"Dia 74 — 25/09/2026 (sexta-feira) — Fase 3","sessions":[{"disciplina":"Consumidor","minutes":105,"temas":["Revisão final orientada pelos erros — fato x vício, súmulas, superendividamento, inversão do ônus","Questões FGV cronometradas."],"kind":"session"},{"disciplina":"Financeiro/Tributário","minutes":75,"temas":["Releitura final de destaques — decadência x prescrição tributária, execução fiscal, imunidades, Reforma Tributária."],"kind":"session"},{"disciplina":"Revisão espaçada","minutes":45,"temas":["T-3 → Dia 71 (Proc. Penal e Humanística: revisão por erros) · T-15 → Dia 59 (Proc. Civil: MS, coletivo; Tributário: compensação, orçamento) · T-45 → Dia 29 (Proc. Penal: prova digital, busca; DH: opiniões consultivas)."],"kind":"review"}]},{"date":"2026-09-26","dayLabel":"Dia 75 — 26/09/2026 (sábado) — Fase 3 — Véspera da prova","sessions":[{"disciplina":"Simulado","minutes":300,"temas":["SIMULADO COMPLETO Nº 2 — 100 questões, formato FGV, cronometrado — último ensaio em condições de prova, com correção sumária focada apenas em lacunas pontuais (sem aprofundamento novo)."],"kind":"simulado"},{"disciplina":"Civil","minutes":150,"temas":["Revisão final leve — releitura de destaques de responsabilidade civil, contratos, prescrição x decadência e súmulas civis"],"kind":"session"},{"disciplina":"Processo Civil","minutes":90,"temas":["Revisão final leve — releitura de destaques de recursos, precedentes e tutelas"],"kind":"session"},{"disciplina":"Revisão espaçada","minutes":45,"temas":["T-3 → Dia 72 (Constitucional e DH: revisão por erros) · T-15 → Dia 60 (Civil: sucessões; Empresarial: títulos) · T-45 → Dia 30 (Constitucional: repartição, intervenção; ECA: competência infância x família)."],"kind":"review"}]}]}</script>
<script>
"use strict";
const PLANO = JSON.parse(document.getElementById('plano').textContent);
const STORE_KEY = 'crono-tjpe-v1';
const THEME_KEY = 'crono-tjpe-theme';
const NOTES_KEY = 'crono-tjpe-notes-v1';

const DISC_COLORS = {
  "Administrativo":"#93c5fd","Ambiental":"#6ee7b7","Civil":"#f9a8d4",
  "Constitucional":"#c4b5fd","Consumidor":"#fde68a","Direitos Humanos":"#fda4af",
  "ECA":"#7dd3fc","Eleitoral":"#d8b4fe","Empresarial":"#fdba74",
  "Financeiro/Tributário":"#99f6e4","Formação Humanística":"#f0abfc",
  "Penal":"#fca5a5","Processo Civil":"#a5b4fc","Processo Penal":"#fecaca",
  "Revisão espaçada":"#d9f99d",
  "Simulado":"#fca5a5"
};
const discColor = d => DISC_COLORS[d] || "#94a3b8";
const fmtMin = m => Math.floor(m/60) + "h" + String(m%60).padStart(2,'0');
const sessionKey = (date, idx) => date + "#" + idx;
const escapeHtml = s => s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function loadDone(){
  try{ const r = localStorage.getItem(STORE_KEY); return new Set(r?JSON.parse(r):[]); }
  catch(e){ return new Set(); }
}
function saveDone(set){ try{ localStorage.setItem(STORE_KEY, JSON.stringify([...set])); }catch(e){} }
let done = loadDone();

/* ---------- notes store ---------- */
function loadNotes(){
  try{ return JSON.parse(localStorage.getItem(NOTES_KEY)) || {}; }catch(e){ return {}; }
}
function saveNotes(obj){ try{ localStorage.setItem(NOTES_KEY, JSON.stringify(obj)); }catch(e){} }
const NOTES = loadNotes();

/* ---------- theme ---------- */
function effectiveTheme(){
  const forced = document.documentElement.getAttribute('data-theme');
  if(forced) return forced;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function applyTheme(t){
  const root = document.documentElement;
  // Suprime transições durante a troca para evitar o "delay"/fade em massa.
  root.classList.add('theme-switching');
  if(t==='light'||t==='dark') root.setAttribute('data-theme', t);
  else root.removeAttribute('data-theme');
  const eff = effectiveTheme();
  const btn = document.getElementById('themeBtn');
  document.getElementById('themeIcon').textContent = eff==='dark' ? '☀️' : '🌙';
  btn.setAttribute('aria-pressed', eff==='dark' ? 'true':'false');
  btn.setAttribute('aria-label', eff==='dark' ? 'Ativar tema claro' : 'Ativar tema escuro');
  requestAnimationFrame(()=>requestAnimationFrame(()=>root.classList.remove('theme-switching')));
}
applyTheme(localStorage.getItem(THEME_KEY));
document.getElementById('themeBtn').addEventListener('click', ()=>{
  const next = effectiveTheme()==='dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
  renderChart();
});
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>{
  if(!localStorage.getItem(THEME_KEY)){ applyTheme(null); renderChart(); }
});

/* ---------- data prep ---------- */
const days = PLANO.days;
let TOTAL_SESS = 0, TOTAL_MIN = 0;
const phaseOrder = [];
for(const day of days){
  for(const s of day.sessions){ TOTAL_SESS++; TOTAL_MIN += s.minutes; }
  const m = day.dayLabel.match(/Fase\s*([0-9]+)/);
  day._phase = m ? m[1] : "—";
  if(!phaseOrder.includes(day._phase)) phaseOrder.push(day._phase);
}
const isDone = (date, idx) => done.has(sessionKey(date, idx));
function dayDoneCount(day){ let c=0; day.sessions.forEach((s,i)=>{ if(isDone(day.date,i)) c++; }); return c; }
function totals(){ let ds=0,dm=0; days.forEach(d=>d.sessions.forEach((s,i)=>{ if(isDone(d.date,i)){ds++;dm+=s.minutes;} })); return {ds,dm}; }
function todayISO(){ const t=new Date(); const z=n=>String(n).padStart(2,'0'); return t.getFullYear()+'-'+z(t.getMonth()+1)+'-'+z(t.getDate()); }
function todayIndex(){ const iso=todayISO(); return days.findIndex(d=>d.date===iso); }

/* ---------- summary ---------- */
function renderSummary(){
  const {ds,dm} = totals();
  const pct = Math.round(ds/TOTAL_SESS*100);
  document.getElementById('doneCount').textContent = ds;
  document.getElementById('totalCount').textContent = TOTAL_SESS;
  document.getElementById('pct').textContent = pct;
  document.getElementById('doneHours').textContent = (dm/60).toFixed(1).replace('.',',');
  document.getElementById('totalHours').textContent = Math.round(TOTAL_MIN/60);
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('barTop').style.width = pct + '%';
  const bar = document.getElementById('barMain');
  bar.setAttribute('aria-valuenow', pct);
  bar.setAttribute('aria-valuetext', ds+' de '+TOTAL_SESS+' sessões concluídas ('+pct+'%)');
}

/* ---------- chart (rendered at real pixel size for crisp text) ---------- */
function computeCumulative(){ const a=[]; let r=0; days.forEach(d=>{ r+=dayDoneCount(d); a.push(r); }); return a; }
function renderChart(){
  const host = document.getElementById('chart');
  const W = Math.max(300, Math.floor(host.clientWidth || 340));
  const H = W < 520 ? 230 : 300;
  const n = days.length, cum = computeCumulative(), maxY = TOTAL_SESS;
  const padL = W<420?34:42, padR=12, padT=16, padB=30;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const x = i => padL + (n<=1?0:(i/(n-1))*plotW);
  const y = v => padT + plotH - (v/maxY)*plotH;
  const fsAxis = W<420?10:11, fsPhase = W<420?10:11;

  let grid="", ylab="";
  for(let k=0;k<=4;k++){
    const val=maxY*k/4, yy=y(val);
    grid += `<line class="grid" x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}"/>`;
    ylab += `<text x="${padL-6}" y="${(yy+3.6).toFixed(1)}" text-anchor="end" font-size="${fsAxis}">${Math.round(val)}</text>`;
  }
  let phaseMarks="", plabels="", start=0;
  for(let i=1;i<n;i++){
    if(days[i]._phase!==days[i-1]._phase){
      const xx=(x(i)+x(i-1))/2;
      phaseMarks += `<line class="phaseln" x1="${xx.toFixed(1)}" y1="${padT}" x2="${xx.toFixed(1)}" y2="${padT+plotH}"/>`;
    }
  }
  for(let i=1;i<=n;i++){
    if(i===n || days[i]._phase!==days[start]._phase){
      const mid=(x(start)+x(i-1))/2;
      plabels += `<text x="${mid.toFixed(1)}" y="${padT+11}" text-anchor="middle" font-size="${fsPhase}" fill="var(--mut)">Fase ${days[start]._phase}</text>`;
      start=i;
    }
  }
  const xstep = W<420?15:10;
  let xlab="";
  for(let i=0;i<n;i+=xstep){ xlab += `<text x="${x(i).toFixed(1)}" y="${H-padB+16}" text-anchor="middle" font-size="${fsAxis}">${i+1}</text>`; }
  xlab += `<text x="${x(n-1).toFixed(1)}" y="${H-padB+16}" text-anchor="middle" font-size="${fsAxis}">${n}</text>`;

  let line=""; cum.forEach((v,i)=>{ line += (i===0?"M":"L")+x(i).toFixed(1)+" "+y(v).toFixed(1)+" "; });
  const area = `M${x(0).toFixed(1)} ${y(0).toFixed(1)} ` +
    cum.map((v,i)=>`L${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(" ") +
    ` L${x(n-1).toFixed(1)} ${y(0).toFixed(1)} Z`;

  const ti = todayIndex();
  let today="";
  if(ti>=0){
    today = `<line class="today" x1="${x(ti).toFixed(1)}" y1="${padT}" x2="${x(ti).toFixed(1)}" y2="${padT+plotH}"/>`+
      `<text x="${x(ti).toFixed(1)}" y="${padT-3}" text-anchor="middle" font-size="${fsAxis}" fill="#f59e0b" font-weight="700">hoje</text>`;
  }
  const dot = `<circle cx="${x(n-1).toFixed(1)}" cy="${y(cum[n-1]).toFixed(1)}" r="4" fill="var(--primary2)"/>`;

  host.innerHTML = `
  <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" role="img"
       aria-label="Progressão: ${cum[n-1]} de ${maxY} sessões concluídas ao longo de ${n} dias">
    <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--primary2)" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="var(--primary2)" stop-opacity="0.02"/>
    </linearGradient></defs>
    ${grid}${phaseMarks}
    <line class="axis" x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}"/>
    <line class="axis" x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}"/>
    ${ylab}${xlab}${plabels}
    <path d="${area}" fill="url(#grad)"/>
    <path class="pline" d="${line.trim()}"/>
    ${today}${dot}
  </svg>`;
}

/* ---------- render days grouped by phase ---------- */
function renderPhases(){
  const root = document.getElementById('phases');
  root.innerHTML = "";
  for(const ph of phaseOrder){
    const pdays = days.filter(d=>d._phase===ph);
    let sess=0, mins=0; pdays.forEach(d=>d.sessions.forEach(s=>{sess++;mins+=s.minutes;}));
    const sec = document.createElement('section'); sec.className='phase';
    sec.innerHTML = `<div class="phase-h"><span class="phase-badge">Fase ${ph}</span></div>`+
      `<p class="pmeta">${pdays.length} dias · ${sess} sessões · ${Math.round(mins/60)} h</p>`+
      `<div class="days"></div>`;
    const grid = sec.querySelector('.days');
    pdays.forEach(day=>{
      const title = day.dayLabel.replace(/\s*—\s*Fase\s*[0-9]+\s*$/,'');
      const card = document.createElement('article');
      card.className='card day'; card.dataset.date=day.date;
      let sHtml="";
      day.sessions.forEach((s,i)=>{
        const checked = isDone(day.date,i);
        const kindCls = s.kind==='review'?' review':s.kind==='simulado'?' simulado':'';
        const temas = s.temas.map(t=>`<li>${escapeHtml(t)}</li>`).join("");
        const alabel = escapeHtml(`${s.disciplina}, ${fmtMin(s.minutes)} — ${title}, sessão ${i+1}`);
        const nkey = sessionKey(day.date,i);
        const nid = 'n-'+day.date+'-'+i;
        const noteRaw = NOTES[nkey] || '';
        const hasNotes = noteRaw.trim() ? ' has-notes' : '';
        sHtml += `<div class="sess${checked?' done':''}${kindCls}" data-key="${nkey}">
            <label class="sess-main">
              <span class="chkwrap"><input type="checkbox" ${checked?'checked':''} aria-label="${alabel}"></span>
              <span class="sbody">
                <span class="srow">
                  <span class="disc" style="background:${discColor(s.disciplina)}">${escapeHtml(s.disciplina)}</span>
                  <span class="carga">${fmtMin(s.minutes)}</span>
                </span>
                <ul class="temas">${temas}</ul>
              </span>
            </label>
            <button type="button" class="notes-toggle${hasNotes}" aria-expanded="false" aria-controls="${nid}"
              aria-label="Anotações da sessão" title="Anotações">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6" fill="none" stroke="currentColor"
                stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="notes-wrap" id="${nid}" hidden>
              <textarea class="notes" data-key="${nkey}" rows="3" placeholder="Anotações desta sessão…"
                aria-label="Anotações da sessão">${escapeHtml(noteRaw)}</textarea>
            </div>
          </div>`;
      });
      card.innerHTML = `<div class="dayhead"><span class="daytitle">${escapeHtml(title)}</span>`+
        `<span class="daytag" data-daytag></span></div>${sHtml}`;
      grid.appendChild(card);
    });
    root.appendChild(sec);
  }
  root.querySelectorAll('input[type=checkbox]').forEach(cb=> cb.addEventListener('change', onToggle));
  root.querySelectorAll('.notes-toggle').forEach(b=> b.addEventListener('click', onNotesToggle));
  root.querySelectorAll('textarea.notes').forEach(t=> t.addEventListener('input', onNotesInput));
  refreshDayStates();
}

function onToggle(e){
  const label = e.target.closest('.sess');
  const key = label.dataset.key;
  if(e.target.checked) done.add(key); else done.delete(key);
  saveDone(done);
  label.classList.toggle('done', e.target.checked);
  refreshDayStates(); renderSummary(); renderChart();
}

/* ---------- notes (caixa retrátil por sessão) ---------- */
function autoGrow(ta){ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight, 400)+'px'; }
function onNotesToggle(e){
  const btn = e.currentTarget;
  const wrap = document.getElementById(btn.getAttribute('aria-controls'));
  const opening = wrap.hasAttribute('hidden');
  if(opening){
    wrap.removeAttribute('hidden');
    btn.setAttribute('aria-expanded','true');
    const ta = wrap.querySelector('textarea'); autoGrow(ta); ta.focus({preventScroll:true});
  } else {
    wrap.setAttribute('hidden','');
    btn.setAttribute('aria-expanded','false');
  }
}
function onNotesInput(e){
  const ta = e.target, key = ta.dataset.key, v = ta.value;
  if(v.trim()) NOTES[key] = v; else delete NOTES[key];
  saveNotes(NOTES);
  autoGrow(ta);
  const btn = ta.closest('.sess').querySelector('.notes-toggle');
  btn.classList.toggle('has-notes', !!v.trim());
}
function refreshDayStates(){
  document.querySelectorAll('.day').forEach(card=>{
    const day = days.find(d=>d.date===card.dataset.date);
    const total = day.sessions.length;
    let c=0; day.sessions.forEach((s,i)=>{ if(isDone(day.date,i)) c++; });
    const full = c===total && total>0;
    card.classList.toggle('done', full);
    const tag = card.querySelector('[data-daytag]');
    tag.textContent = full ? '✓ concluído' : `${c}/${total} sessões`;
    tag.classList.toggle('full', full);
  });
}
function syncAll(){
  document.querySelectorAll('.sess').forEach(el=>{
    const on = done.has(el.dataset.key);
    el.classList.toggle('done', on);
    const cb = el.querySelector('input'); if(cb) cb.checked = on;
  });
  refreshDayStates(); renderSummary(); renderChart();
}

/* ---------- snackbar with undo ---------- */
let snackTimer=null;
function showSnackbar(msg, actionLabel, cb){
  const bar=document.getElementById('snackbar'), act=document.getElementById('snackAction');
  document.getElementById('snackMsg').textContent = msg;
  bar.hidden=false; requestAnimationFrame(()=>bar.classList.add('show'));
  if(actionLabel){ act.hidden=false; act.textContent=actionLabel; act.onclick=()=>{ hideSnackbar(); cb&&cb(); }; }
  else act.hidden=true;
  clearTimeout(snackTimer); snackTimer=setTimeout(hideSnackbar, 6000);
}
function hideSnackbar(){
  const bar=document.getElementById('snackbar');
  bar.classList.remove('show'); clearTimeout(snackTimer);
  setTimeout(()=>{ bar.hidden=true; }, 300);
}

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(done.size===0){ showSnackbar('Nenhum progresso para limpar.'); return; }
  const snapshot = new Set(done);
  done = new Set(); saveDone(done); syncAll();
  showSnackbar('Progresso limpo.', 'Desfazer', ()=>{ done = snapshot; saveDone(done); syncAll(); });
});

/* ---------- go to today ---------- */
const todayBtn = document.getElementById('todayBtn');
(function initToday(){
  const ti = todayIndex();
  if(ti<0){ todayBtn.disabled=true; todayBtn.setAttribute('aria-label','Hoje está fora do período do cronograma'); }
})();
todayBtn.addEventListener('click', ()=>{
  const ti = todayIndex(); if(ti<0) return;
  const iso = days[ti].date;
  const card = document.querySelector(`.day[data-date="${iso}"]`);
  if(card){
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    card.scrollIntoView({behavior: reduce?'auto':'smooth', block:'center'});
    card.classList.remove('flash'); void card.offsetWidth; card.classList.add('flash');
  }
});

/* ---------- responsive chart re-render ---------- */
let rt=null;
window.addEventListener('resize', ()=>{ clearTimeout(rt); rt=setTimeout(renderChart, 150); });

/* ---------- init ---------- */
(function initHeader(){
  const sd=days[0].date.split('-'), ed=days[days.length-1].date.split('-');
  document.getElementById('period').textContent =
    `${sd[2]}/${sd[1]}/${sd[0]} → ${ed[2]}/${ed[1]}/${ed[0]}  ·  ${days.length} dias  ·  ${TOTAL_SESS} sessões  ·  ${Math.round(TOTAL_MIN/60)} h`;
})();
renderPhases();
renderSummary();
renderChart();

/* ---------- PWA: instalar como app (Android/Chrome) ---------- */
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches;
}
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault(); deferredPrompt = e;
  if(!isStandalone()) installBtn.hidden = false;
});
installBtn.addEventListener('click', async ()=>{
  if(!deferredPrompt) return;
  installBtn.hidden = true;
  deferredPrompt.prompt();
  try{ await deferredPrompt.userChoice; }catch(e){}
  deferredPrompt = null;
});
window.addEventListener('appinstalled', ()=>{
  installBtn.hidden = true; deferredPrompt = null;
  showSnackbar('App instalado com sucesso!');
});

/* ---------- PWA: service worker (offline) ---------- */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
